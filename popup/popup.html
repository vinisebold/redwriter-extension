<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdBlock</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-shell">
    <header class="topbar">
      <div class="brand-wrap">
         <img class="brand-logo" src="../adblock_full.svg" alt="AdBlock Logo" />
      </div>
      <div class="topbar-actions">
         <button class="icon-btn" type="button" aria-label="Help">
           <svg viewBox="0 0 24 24" fill="#969696"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
         </button>
         <button class="icon-btn icon-btn-gear" type="button" id="advancedToggle" aria-label="Settings">
           <svg viewBox="0 0 24 24" fill="#969696"><path d="M19.14 12.94c.04-.31.06-.62.06-.94s-.02-.63-.07-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.62 7.62 0 0 0-1.62-.94l-.36-2.54A.5.5 0 0 0 13.9 2h-3.8a.5.5 0 0 0-.49.42l-.36 2.54c-.57.22-1.11.53-1.62.94l-2.39-.96a.5.5 0 0 0-.6.22L2.72 8.48a.5.5 0 0 0 .12.64l2.03 1.58c-.05.31-.07.63-.07.94s.02.63.07.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.13.22.39.31.6.22l2.39-.96c.5.41 1.05.72 1.62.94l.36 2.54c.04.24.25.42.49.42h3.8c.24 0 .45-.18.49-.42l.36-2.54c.57-.22 1.12-.53 1.62-.94l2.39.96c.22.09.47 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z"/></svg>
         </button>
         <button class="icon-btn dots-btn" type="button" aria-label="More options">
           <svg viewBox="0 0 24 24" fill="#969696"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
         </button>
      </div>
    </header>

    <main class="panel">
      <!-- Hidden Advanced Section for the extension's real functionality -->
      <section class="advanced-section" id="advancedSection">
        <label class="advanced-label" for="draftText">Notes</label>
        <textarea id="draftText" rows="4" placeholder="Alt+R play/pause  ·  Alt+O next word  ·  Alt+Q cancel" spellcheck="false"></textarea>
        <div class="advanced-actions">
          <button class="btn-save" id="saveTextBtn" type="button">Save</button>
          <span class="save-status" id="saveStatus"></span>
        </div>
      </section>

      <div class="main-content">
        <article class="feature-card feature-card-stats">
          <div class="feature-header">
            <div class="feature-title-wrap">
              <span class="feature-icon dark-hand" aria-hidden="true">
                <svg viewBox="0 0 79 80"><path fill-rule="evenodd" fill="#424242" d="m21.41 1.74l-19.67 19.67c-1.12 1.11-1.74 2.62-1.74 4.19v27.82c0 1.57 0.62 3.08 1.74 4.19l19.67 19.67c1.11 1.11 2.61 1.73 4.19 1.73h27.82c1.57 0 3.08-0.62 4.19-1.73l19.67-19.67c1.11-1.11 1.73-2.62 1.73-4.19v-27.82c0-1.57-0.62-3.08-1.73-4.19l-19.67-19.67c-1.11-1.12-2.62-1.74-4.19-1.74h-27.82c-1.58 0-3.08 0.62-4.19 1.74z"/><path fill-rule="evenodd" fill="#efefef" d="m38.56 68.15c13.09 0 16.2-12.01 16.2-12.01l7.51-21.58c0 0 0.68-2.24 0.56-2.27-7-1.31-8.49 3.62-8.49 3.62 0 0-2.69 6.99-3.1 6.99-0.42 0-0.47-0.52-0.47-0.52v-25.09c0 0 0.13-3.24-3.19-3.24-3.33 0-3.16 3.25-3.16 3.25l0.01 18.53c0 0 0.04 0.75-0.58 0.75-0.55 0-0.52-0.72-0.52-0.72v-22.34c0 0 0.2-3.64-3.16-3.64-3.36 0-3.18 3.67-3.18 3.67l-0.03 22.03c0 0 0.04 0.68-0.51 0.68-0.52 0-0.5-0.67-0.5-0.67v-18.47c0 0 0.19-3.76-3.24-3.76-3.36 0-3.18 3.82-3.18 3.82l-0.03 19.51c0 0 0.06 0.57-0.46 0.57-0.56 0-0.55-0.57-0.55-0.57l-0.03-11.79c0 0 0.03-3.27-2.79-3.27-3.01 0-2.95 3.27-2.95 3.27v25.45c0.02 0-0.76 17.8 15.84 17.8z"/></svg>
              </span>
              <span class="feature-title">Block Ads</span>
            </div>
          </div>
          <div class="feature-divider"></div>
          <div class="stats-row">
            <div class="stat-block left-stat">
              <span class="stat-number">0</span>
              <span class="stat-text">on this page</span>
            </div>
            <div class="stat-block right-stat">
              <span class="stat-number">13</span>
              <span class="stat-text">in total</span>
            </div>
          </div>
        </article>

        <article class="feature-card row-card">
          <div class="feature-title-wrap">
            <span class="feature-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="#424242"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            </span>
            <span class="feature-title">Skip Cookie Walls</span>
          </div>
          <button class="btn-yellow" type="button">Learn More</button>
        </article>

        <article class="feature-card row-card">
          <div class="feature-title-wrap">
            <span class="feature-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="#424242"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            </span>
            <span class="feature-title">Block Distractions</span>
          </div>
          <button class="btn-yellow" type="button">Learn More</button>
        </article>

        <button class="pause-button" id="mainToggle" type="button">
          <svg class="pause-icon" viewBox="0 0 24 24" width="16" height="16" fill="#444"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          <span class="pause-label">Pause on this site</span>
        </button>
      </div>
    </main>
  </div>

  <script src="popup.js"></script>
</body>
</html>
